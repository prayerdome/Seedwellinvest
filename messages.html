<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages · Seedwel Global Marketplace</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0d2b4e;
            --primary-light: #1a4a7a;
            --primary-lighter: #2a6a9e;
            --accent: #e67e22;
            --success: #27ae60;
            --danger: #e74c3c;
            --dark: #1a2e4a;
            --gray: #5f8eb0;
            --light-gray: #a0c0e0;
            --bg-light: #f4f9fe;
            --white: #ffffff;
            --border-light: #d9e6f2;
            --shadow-sm: 0 4px 12px rgba(13, 43, 78, 0.06);
            --shadow-md: 0 8px 24px rgba(13, 43, 78, 0.1);
            --shadow-lg: 0 16px 40px rgba(13, 43, 78, 0.14);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--bg-light);
            color: var(--dark);
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
        }

        .marketplace-container {
            max-width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* —— COMPACT HEADER —— */
        .compact-header {
            background: linear-gradient(135deg, #0d2b4e 0%, #1a4a7a 100%);
            padding: 0.8rem 2rem;
            box-shadow: var(--shadow-md);
            flex-shrink: 0;
            z-index: 1000;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
        }

        .menu-icon-wrapper {
            width: 40px;
            display: flex;
            align-items: center;
        }

        .menu-icon {
            width: 36px;
            height: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .menu-icon:hover {
            background: rgba(255,255,255,0.1);
        }

        .menu-icon span {
            width: 20px;
            height: 2px;
            background: white;
            border-radius: 4px;
            transition: var(--transition);
        }

        .menu-icon span:nth-child(2) {
            width: 14px;
            margin-left: auto;
        }

        .menu-icon:hover span:nth-child(2) {
            width: 20px;
        }

        .logo-centered {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-image {
            height: 36px;
            width: auto;
            object-fit: contain;
            filter: brightness(1.05);
        }

        .user-icon-wrapper {
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .user-icon {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 1rem;
        }

        .user-icon:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .search-row {
            max-width: 700px;
            margin: 0.8rem auto 0;
            padding-bottom: 0.2rem;
        }

        .search-container {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 50px;
            padding: 0.2rem 0.2rem 0.2rem 1.2rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .search-container i {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .search-container input {
            flex: 1;
            border: none;
            outline: none;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            background: transparent;
        }

        .search-container input::placeholder {
            color: var(--light-gray);
            font-weight: 300;
        }

        .search-container button {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-lighter) 100%);
            color: white;
            border: none;
            padding: 0.55rem 1.8rem;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .search-container button:hover {
            background: linear-gradient(135deg, #0a1f35 0%, var(--primary-light) 100%);
        }

        /* Dropdowns */
        .menu-dropdown, .user-dropdown {
            position: absolute;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            min-width: 220px;
            display: none;
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .menu-dropdown { top: 60px; left: 20px; }
        .user-dropdown { top: 60px; right: 20px; }

        .menu-dropdown.show, .user-dropdown.show { display: block; }

        .menu-dropdown a, .user-dropdown a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.9rem 1.5rem;
            color: var(--dark);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            border-bottom: 1px solid var(--border-light);
        }

        .menu-dropdown a:last-child, .user-dropdown a:last-child { border-bottom: none; }
        .menu-dropdown a:hover, .user-dropdown a:hover { background: var(--bg-light); color: var(--primary); }
        .menu-dropdown a i, .user-dropdown a i { width: 20px; color: var(--gray); }
        .divider { height: 1px; background: var(--border-light); margin: 0.5rem 0; }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 999;
            display: none;
        }
        .overlay.show { display: block; }

        /* —— MESSAGES LAYOUT —— */
        .messages-layout {
            display: flex;
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 1.5rem 2rem;
            gap: 1.5rem;
            overflow: hidden;
            min-height: 0;
        }

        @media (max-width: 900px) {
            .messages-layout { padding: 1rem; }
            .compact-header { padding: 0.8rem 1rem; }
        }

        /* Conversations Sidebar */
        .conversations-sidebar {
            width: 340px;
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1.5px solid var(--border-light);
        }

        .sidebar-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .search-conversations {
            display: flex;
            align-items: center;
            background: var(--bg-light);
            border-radius: 40px;
            padding: 0.5rem 1rem;
            border: 1.5px solid var(--border-light);
        }

        .search-conversations i {
            color: var(--gray);
            margin-right: 10px;
        }

        .search-conversations input {
            border: none;
            background: transparent;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            width: 100%;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid #e8f0f7;
            position: relative;
        }

        .conversation-item:hover {
            background: #f8fcff;
        }

        .conversation-item.active {
            background: #e4eef8;
            border-left: 4px solid var(--primary);
        }

        .conversation-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(145deg, var(--primary), var(--primary-lighter));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            flex-shrink: 0;
            position: relative;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 11px;
            height: 11px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid white;
        }

        .conversation-info {
            flex: 1;
            min-width: 0;
        }

        .conversation-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .conversation-name {
            font-weight: 600;
            color: var(--dark);
            font-size: 0.9rem;
        }

        .conversation-time {
            font-size: 0.65rem;
            color: var(--light-gray);
        }

        .conversation-preview {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .last-message {
            font-size: 0.75rem;
            color: var(--gray);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        .unread-badge {
            background: var(--primary);
            color: white;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            min-width: 20px;
            text-align: center;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .chat-header {
            padding: 1.2rem 1.8rem;
            border-bottom: 1.5px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(145deg, var(--primary), var(--primary-lighter));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            position: relative;
        }

        .chat-user-details h3 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 2px;
            font-size: 1rem;
        }

        .chat-status {
            font-size: 0.7rem;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-status.online {
            color: var(--success);
        }

        .chat-actions {
            display: flex;
            gap: 6px;
        }

        .chat-action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--bg-light);
            border: 1.5px solid var(--border-light);
            color: var(--gray);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .chat-action-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Listing Reference Card */
        .listing-ref-card {
            margin: 0 1.5rem 1rem;
            padding: 0.8rem 1rem;
            background: var(--bg-light);
            border-radius: 14px;
            border: 1.5px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .listing-ref-thumb {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            overflow: hidden;
        }

        .listing-ref-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .listing-ref-info h4 {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--dark);
        }

        .listing-ref-price {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.8rem;
        }

        .listing-ref-link {
            margin-left: auto;
            color: var(--gray);
            font-size: 0.75rem;
            text-decoration: none;
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .message-date-divider {
            text-align: center;
            margin: 0.5rem 0;
        }

        .message-date-divider span {
            background: #e1ecf5;
            color: var(--gray);
            font-size: 0.65rem;
            padding: 4px 14px;
            border-radius: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .message-wrapper {
            display: flex;
            gap: 10px;
            max-width: 70%;
        }

        .message-wrapper.sent {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message-avatar-small {
            width: 30px;
            height: 30px;
            border-radius: 10px;
            background: linear-gradient(145deg, var(--primary), var(--primary-lighter));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message-bubble {
            background: var(--bg-light);
            padding: 0.7rem 1rem;
            border-radius: 18px;
            border-top-left-radius: 4px;
            border: 1px solid var(--border-light);
        }

        .message-wrapper.sent .message-bubble {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-lighter) 100%);
            color: white;
            border: none;
            border-radius: 18px;
            border-top-right-radius: 4px;
        }

        .message-text {
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .message-time {
            font-size: 0.6rem;
            margin-top: 4px;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .message-wrapper.sent .message-time {
            justify-content: flex-end;
        }

        /* Message Input */
        .message-input-area {
            padding: 1rem 1.8rem;
            border-top: 1.5px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .message-input-actions {
            display: flex;
            gap: 4px;
        }

        .input-action-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--bg-light);
            border: 1.5px solid var(--border-light);
            color: var(--gray);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .input-action-btn:hover {
            background: var(--primary);
            color: white;
        }

        .message-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-light);
            border-radius: 40px;
            padding: 0.3rem 0.3rem 0.3rem 1.2rem;
            border: 1.5px solid var(--border-light);
        }

        .message-input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            padding: 0.5rem 0;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-lighter) 100%);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #0a1f35 0%, var(--primary-light) 100%);
            transform: scale(1.05);
        }

        /* Empty State */
        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--light-gray);
            text-align: center;
            padding: 2rem;
        }

        .empty-chat i {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-chat h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--gray);
            margin-bottom: 0.3rem;
        }

        /* New Conversation Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            font-family: 'Outfit', sans-serif;
            color: var(--primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-light);
            border: none;
            cursor: pointer;
            color: var(--gray);
        }

        .btn-new-chat {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-light);
            border: 1.5px dashed var(--border-light);
            border-radius: 14px;
            color: var(--gray);
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 9999;
            font-size: 0.85rem;
        }

        .toast.show { transform: translateX(0); }
        .toast.success { background: linear-gradient(135deg, var(--primary), var(--primary-lighter)); }
        .toast.error { background: linear-gradient(135deg, #c0392b, #e74c3c); }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #f0f7ff;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cde0ee;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="marketplace-container">
        <!-- COMPACT HEADER -->
        <header class="compact-header">
            <div class="header-row">
                <div class="menu-icon-wrapper">
                    <div class="menu-icon" onclick="toggleMenu()">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>

                <div class="logo-centered">
                    <img src="https://i.ibb.co/svxj52ny/seedwel.png" alt="Seedwel" class="logo-image">
                </div>

                <div class="user-icon-wrapper">
                    <div class="user-icon" id="userIcon" onclick="toggleUserMenu()">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>

            <div class="search-row">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search listings..." id="headerSearch">
                    <button onclick="performHeaderSearch()">
                        Search <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>

            <div class="menu-dropdown" id="menuDropdown">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <a href="browse.html"><i class="fas fa-search"></i> Browse</a>
                <a href="create-listing.html"><i class="fas fa-plus-circle"></i> Sell Item</a>
                <a href="messages.html"><i class="fas fa-comments"></i> Messages</a>
                <a href="#"><i class="fas fa-tag"></i> Deals</a>
                <a href="#"><i class="fas fa-info-circle"></i> Help Center</a>
            </div>

            <div class="user-dropdown" id="userDropdown">
                <div id="userDropdownContent">
                    <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
                    <a href="register.html"><i class="fas fa-user-plus"></i> Sign Up</a>
                </div>
            </div>
        </header>

        <div class="overlay" id="overlay" onclick="closeAllDropdowns()"></div>

        <!-- MESSAGES LAYOUT -->
        <div class="messages-layout">
            <!-- CONVERSATIONS SIDEBAR -->
            <div class="conversations-sidebar">
                <div class="sidebar-header">
                    <h2>Messages</h2>
                    <div class="search-conversations">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search conversations..." id="conversationSearch">
                    </div>
                    <button class="btn-new-chat" onclick="openNewChatModal()" style="margin-top: 1rem;">
                        <i class="fas fa-plus"></i> New Conversation
                    </button>
                </div>
                <div class="conversations-list" id="conversationsList">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <!-- CHAT AREA -->
            <div class="chat-area">
                <div class="chat-header" id="chatHeader">
                    <div class="chat-user-info">
                        <div class="chat-avatar" id="chatAvatar">
                            <span id="chatInitial">?</span>
                            <span class="online-indicator" id="onlineIndicator" style="display: none;"></span>
                        </div>
                        <div class="chat-user-details">
                            <h3 id="chatUserName">Select a conversation</h3>
                            <div class="chat-status" id="chatStatus"></div>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="chat-action-btn" onclick="startVoiceCall()"><i class="fas fa-phone-alt"></i></button>
                        <button class="chat-action-btn" onclick="startVideoCall()"><i class="fas fa-video"></i></button>
                        <button class="chat-action-btn" onclick="showChatInfo()"><i class="fas fa-info"></i></button>
                    </div>
                </div>

                <div class="listing-ref-card" id="listingRefCard" style="display: none;">
                    <div class="listing-ref-thumb">
                        <img src="" alt="" id="listingRefImage">
                    </div>
                    <div class="listing-ref-info">
                        <h4 id="listingRefTitle">—</h4>
                        <div class="listing-ref-price" id="listingRefPrice">—</div>
                    </div>
                    <a href="#" class="listing-ref-link" id="listingRefLink">View <i class="fas fa-arrow-right"></i></a>
                </div>

                <div class="messages-container" id="messagesContainer">
                    <div class="empty-chat">
                        <i class="fas fa-comments"></i>
                        <h3>Select a conversation</h3>
                        <p>Choose a conversation from the sidebar to start messaging</p>
                    </div>
                </div>

                <div class="message-input-area" id="messageInputArea" style="display: none;">
                    <div class="message-input-actions">
                        <button class="input-action-btn" onclick="attachImage()"><i class="fas fa-image"></i></button>
                        <button class="input-action-btn" onclick="attachFile()"><i class="fas fa-paperclip"></i></button>
                    </div>
                    <div class="message-input-wrapper">
                        <input type="text" placeholder="Type a message..." id="messageInput">
                        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- NEW CONVERSATION MODAL -->
    <div class="modal" id="newChatModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-plus-circle"></i> New Conversation</h3>
                <button class="modal-close" onclick="closeNewChatModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="form-group">
                <label class="form-label">User Email or ID</label>
                <input type="text" class="form-input" id="newChatUser" placeholder="Enter user email...">
            </div>
            <div class="form-group">
                <label class="form-label">Initial Message (Optional)</label>
                <input type="text" class="form-input" id="newChatMessage" placeholder="Hi! I'm interested in...">
            </div>
            <button class="btn-pay-primary" onclick="createNewConversation()" style="width: 100%; margin-top: 1rem;">
                <i class="fas fa-comment"></i> Start Conversation
            </button>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Message</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            query, 
            where, 
            orderBy, 
            onSnapshot, 
            addDoc, 
            serverTimestamp,
            updateDoc,
            doc,
            getDocs,
            arrayUnion,
            getDoc,
            setDoc,
            limit
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-BpRy-RVc2rqIG6uiRu_XrGEu1ZGnQwU",
            authDomain: "seedwel-investment-limited.firebaseapp.com",
            databaseURL: "https://seedwel-investment-limited-default-rtdb.firebaseio.com",
            projectId: "seedwel-investment-limited",
            storageBucket: "seedwel-investment-limited.firebasestorage.app",
            messagingSenderId: "197778268619",
            appId: "1:197778268619:web:92f29d88fa5a22dbfa964e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentConversation = null;
        let conversations = [];
        let messagesUnsubscribe = null;
        let conversationsUnsubscribe = null;

        // ============================================
        // AUTHENTICATION
        // ============================================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                updateUserMenu(user);
                loadConversations();
                updateUserPresence(user.uid, true);
            } else {
                window.location.href = 'login.html';
            }
        });

        // Update user online presence
        async function updateUserPresence(uid, isOnline) {
            try {
                const userRef = doc(db, 'users', uid);
                await updateDoc(userRef, {
                    online: isOnline,
                    lastSeen: serverTimestamp()
                });
            } catch (error) {
                // Create user doc if it doesn't exist
                if (error.code === 'not-found') {
                    await setDoc(doc(db, 'users', uid), {
                        online: isOnline,
                        lastSeen: serverTimestamp(),
                        email: currentUser.email,
                        displayName: currentUser.displayName || currentUser.email?.split('@')[0]
                    });
                }
            }
        }

        // Set offline on page unload
        window.addEventListener('beforeunload', () => {
            if (currentUser) {
                updateUserPresence(currentUser.uid, false);
            }
        });

        function updateUserMenu(user) {
            const dropdownContent = document.getElementById('userDropdownContent');
            const userIcon = document.getElementById('userIcon');
            
            if (user) {
                const displayName = user.displayName || user.email?.split('@')[0] || 'User';
                userIcon.innerHTML = `<span style="font-weight:600;">${displayName.charAt(0).toUpperCase()}</span>`;
                
                dropdownContent.innerHTML = `
                    <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                    <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
                    <a href="messages.html"><i class="fas fa-comments"></i> Messages</a>
                    <a href="create-listing.html"><i class="fas fa-plus-circle"></i> Sell Item</a>
                    <div class="divider"></div>
                    <a href="#" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
                `;
            } else {
                userIcon.innerHTML = `<i class="fas fa-user"></i>`;
                dropdownContent.innerHTML = `
                    <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
                    <a href="register.html"><i class="fas fa-user-plus"></i> Sign Up</a>
                `;
            }
        }
        
        // ============================================
        // DROPDOWN FUNCTIONS
        // ============================================
        window.toggleMenu = () => {
            document.getElementById('userDropdown').classList.remove('show');
            document.getElementById('menuDropdown').classList.toggle('show');
            document.getElementById('overlay').classList.toggle('show');
        };

        window.toggleUserMenu = () => {
            document.getElementById('menuDropdown').classList.remove('show');
            document.getElementById('userDropdown').classList.toggle('show');
            document.getElementById('overlay').classList.toggle('show');
        };

        window.closeAllDropdowns = () => {
            document.getElementById('menuDropdown').classList.remove('show');
            document.getElementById('userDropdown').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        };

        window.handleLogout = async () => {
            try {
                if (currentUser) {
                    await updateUserPresence(currentUser.uid, false);
                }
                await signOut(auth);
                showToast('Logged out successfully', 'success');
                setTimeout(() => window.location.href = 'index.html', 1000);
            } catch (error) {
                showToast('Logout failed', 'error');
            }
        };

        window.performHeaderSearch = () => {
            const searchTerm = document.getElementById('headerSearch').value;
            if (searchTerm) {
                window.location.href = `browse.html?search=${encodeURIComponent(searchTerm)}`;
            }
        };

        // ============================================
        // REAL-TIME CONVERSATIONS
        // ============================================
        function loadConversations() {
            if (conversationsUnsubscribe) {
                conversationsUnsubscribe();
            }

            const convRef = collection(db, 'conversations');
            const q = query(
                convRef,
                where('participants', 'array-contains', currentUser.uid),
                orderBy('lastMessageTime', 'desc')
            );

            conversationsUnsubscribe = onSnapshot(q, async (snapshot) => {
                const convs = [];
                
                for (const docSnap of snapshot.docs) {
                    const data = docSnap.data();
                    const otherUserId = data.participants.find(id => id !== currentUser.uid);
                    
                    // Get other user's info
                    let otherUser = { displayName: 'User', online: false };
                    if (otherUserId) {
                        try {
                            const userDoc = await getDoc(doc(db, 'users', otherUserId));
                            if (userDoc.exists()) {
                                otherUser = userDoc.data();
                            }
                        } catch (e) {
                            console.error('Error fetching user:', e);
                        }
                    }

                    // Count unread messages
                    const unreadCount = data.unreadCount?.[currentUser.uid] || 0;

                    convs.push({
                        id: docSnap.id,
                        userId: otherUserId,
                        userName: otherUser.displayName || 'User',
                        online: otherUser.online || false,
                        lastMessage: data.lastMessage || 'Start a conversation',
                        lastMessageTime: data.lastMessageTime?.toDate() || new Date(),
                        unread: unreadCount,
                        listing: data.listing || null
                    });
                }

                conversations = convs;
                renderConversations();

                // Auto-select conversation from URL params
                const urlParams = new URLSearchParams(window.location.search);
                const sellerId = urlParams.get('seller');
                const listingId = urlParams.get('listing');
                
                if (sellerId && !currentConversation) {
                    const conv = conversations.find(c => c.userId === sellerId);
                    if (conv) {
                        selectConversation(conv);
                    } else if (listingId) {
                        // Create new conversation if it doesn't exist
                        createConversationFromParams(sellerId, listingId);
                    }
                }
            }, (error) => {
                console.error('Error loading conversations:', error);
            });
        }

        async function createConversationFromParams(sellerId, listingId) {
            try {
                // Get seller info
                const sellerDoc = await getDoc(doc(db, 'users', sellerId));
                const sellerData = sellerDoc.exists() ? sellerDoc.data() : { displayName: 'Seller' };
                
                // Get listing info
                let listing = null;
                if (listingId) {
                    const listingDoc = await getDoc(doc(db, 'listings', listingId));
                    if (listingDoc.exists()) {
                        listing = {
                            id: listingId,
                            title: listingDoc.data().title,
                            price: listingDoc.data().price,
                            image: listingDoc.data().images?.[0]
                        };
                    }
                }

                // Create conversation
                const convRef = await addDoc(collection(db, 'conversations'), {
                    participants: [currentUser.uid, sellerId],
                    lastMessage: 'Start a conversation',
                    lastMessageTime: serverTimestamp(),
                    unreadCount: {
                        [currentUser.uid]: 0,
                        [sellerId]: 0
                    },
                    listing: listing,
                    createdAt: serverTimestamp()
                });

                showToast('Conversation created!', 'success');
            } catch (error) {
                console.error('Error creating conversation:', error);
                showToast('Failed to create conversation', 'error');
            }
        }

        function renderConversations() {
            const container = document.getElementById('conversationsList');
            const searchTerm = document.getElementById('conversationSearch')?.value.toLowerCase() || '';
            
            const filtered = conversations.filter(c => 
                c.userName.toLowerCase().includes(searchTerm) ||
                c.lastMessage.toLowerCase().includes(searchTerm)
            );
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: var(--gray);">
                        <i class="fas fa-comments" style="font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.5;"></i>
                        <p>No conversations yet</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(conv => `
                <div class="conversation-item ${currentConversation?.id === conv.id ? 'active' : ''}" 
                     onclick="selectConversationById('${conv.id}')">
                    <div class="conversation-avatar">
                        ${conv.userName.charAt(0).toUpperCase()}
                        ${conv.online ? '<span class="online-indicator"></span>' : ''}
                    </div>
                    <div class="conversation-info">
                        <div class="conversation-header">
                            <span class="conversation-name">${conv.userName}</span>
                            <span class="conversation-time">${getTimeAgo(conv.lastMessageTime)}</span>
                        </div>
                        <div class="conversation-preview">
                            <span class="last-message">${conv.lastMessage}</span>
                            ${conv.unread > 0 ? `<span class="unread-badge">${conv.unread}</span>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.selectConversationById = (id) => {
            const conv = conversations.find(c => c.id === id);
            if (conv) selectConversation(conv);
        };

        function selectConversation(conv) {
            // Unsubscribe from previous messages
            if (messagesUnsubscribe) {
                messagesUnsubscribe();
            }

            currentConversation = conv;
            
            // Update UI
            document.getElementById('chatInitial').textContent = conv.userName.charAt(0).toUpperCase();
            document.getElementById('chatUserName').textContent = conv.userName;
            
            const statusEl = document.getElementById('chatStatus');
            const onlineIndicator = document.getElementById('onlineIndicator');
            
            if (conv.online) {
                statusEl.innerHTML = '<i class="fas fa-circle" style="font-size: 0.45rem; color: var(--success);"></i><span style="color: var(--success);">Online</span>';
                onlineIndicator.style.display = 'block';
            } else {
                statusEl.innerHTML = '<i class="fas fa-clock" style="font-size: 0.65rem;"></i><span>Offline</span>';
                onlineIndicator.style.display = 'none';
            }
            
            // Show listing reference if exists
            const listingCard = document.getElementById('listingRefCard');
            if (conv.listing) {
                listingCard.style.display = 'flex';
                document.getElementById('listingRefImage').src = conv.listing.image || 'https://via.placeholder.com/100';
                document.getElementById('listingRefTitle').textContent = conv.listing.title;
                document.getElementById('listingRefPrice').textContent = `$${conv.listing.price?.toLocaleString()}`;
                document.getElementById('listingRefLink').href = `listing-detail.html?id=${conv.listing.id}`;
            } else {
                listingCard.style.display = 'none';
            }
            
            // Mark messages as read
            markMessagesAsRead(conv.id);
            
            // Subscribe to messages
            loadMessages(conv.id);
            
            // Show message input
            document.getElementById('messageInputArea').style.display = 'flex';
            
            // Update active state
            renderConversations();
        }

        async function markMessagesAsRead(conversationId) {
            if (!currentUser) return;
            
            try {
                const convRef = doc(db, 'conversations', conversationId);
                await updateDoc(convRef, {
                    [`unreadCount.${currentUser.uid}`]: 0
                });
            } catch (error) {
                console.error('Error marking as read:', error);
            }
        }

        function loadMessages(conversationId) {
            const container = document.getElementById('messagesContainer');
            
            const messagesRef = collection(db, 'conversations', conversationId, 'messages');
            const q = query(messagesRef, orderBy('timestamp', 'asc'));
            
            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                if (snapshot.empty) {
                    container.innerHTML = `
                        <div class="empty-chat" style="padding: 2rem;">
                            <i class="fas fa-comment-dots"></i>
                            <h3>No messages yet</h3>
                            <p>Send a message to start the conversation</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                let currentDate = '';
                
                snapshot.docs.forEach((docSnap) => {
                    const msg = docSnap.data();
                    const msgDate = msg.timestamp?.toDate() || new Date();
                    const dateStr = getMessageDateString(msgDate);
                    
                    if (dateStr !== currentDate) {
                        currentDate = dateStr;
                        html += `<div class="message-date-divider"><span>${dateStr}</span></div>`;
                    }
                    
                    const isSent = msg.senderId === currentUser?.uid;
                    
                    html += `
                        <div class="message-wrapper ${isSent ? 'sent' : ''}">
                            ${!isSent ? `<div class="message-avatar-small">${currentConversation?.userName.charAt(0) || '?'}</div>` : ''}
                            <div class="message-bubble">
                                <div class="message-text">${escapeHtml(msg.text)}</div>
                                <div class="message-time">
                                    ${formatMessageTime(msgDate)}
                                    ${isSent ? (msg.read ? '<i class="fas fa-check-double" style="color: var(--success);"></i>' : '<i class="fas fa-check"></i>') : ''}
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });
        }

        // ============================================
        // SEND MESSAGE (REAL-TIME)
        // ============================================
        window.sendMessage = async () => {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentConversation) return;
            
            input.value = '';
            
            try {
                const convRef = doc(db, 'conversations', currentConversation.id);
                const otherUserId = currentConversation.userId;
                
                // Add message
                await addDoc(collection(db, 'conversations', currentConversation.id, 'messages'), {
                    senderId: currentUser.uid,
                    text: text,
                    timestamp: serverTimestamp(),
                    read: false
                });
                
                // Update conversation
                await updateDoc(convRef, {
                    lastMessage: text,
                    lastMessageTime: serverTimestamp(),
                    [`unreadCount.${otherUserId}`]: (currentConversation.unread || 0) + 1
                });
                
            } catch (error) {
                console.error('Error sending message:', error);
                showToast('Failed to send message', 'error');
            }
        };

        // ============================================
        // NEW CONVERSATION
        // ============================================
        window.openNewChatModal = () => {
            document.getElementById('newChatModal').classList.add('show');
        };

        window.closeNewChatModal = () => {
            document.getElementById('newChatModal').classList.remove('show');
        };

        window.createNewConversation = async () => {
            const userInput = document.getElementById('newChatUser').value.trim();
            const initialMessage = document.getElementById('newChatMessage').value.trim();
            
            if (!userInput) {
                showToast('Please enter a user email', 'error');
                return;
            }
            
            try {
                // Find user by email
                const usersRef = collection(db, 'users');
                const q = query(usersRef, where('email', '==', userInput), limit(1));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    showToast('User not found', 'error');
                    return;
                }
                
                const otherUser = snapshot.docs[0];
                const otherUserId = otherUser.id;
                
                // Check if conversation already exists
                const existingConv = conversations.find(c => c.userId === otherUserId);
                if (existingConv) {
                    selectConversation(existingConv);
                    closeNewChatModal();
                    
                    // Send initial message if provided
                    if (initialMessage) {
                        currentConversation = existingConv;
                        document.getElementById('messageInput').value = initialMessage;
                        sendMessage();
                    }
                    return;
                }
                
                // Create new conversation
                const convRef = await addDoc(collection(db, 'conversations'), {
                    participants: [currentUser.uid, otherUserId],
                    lastMessage: initialMessage || 'Start a conversation',
                    lastMessageTime: serverTimestamp(),
                    unreadCount: {
                        [currentUser.uid]: 0,
                        [otherUserId]: initialMessage ? 1 : 0
                    },
                    createdAt: serverTimestamp()
                });
                
                // Send initial message if provided
                if (initialMessage) {
                    await addDoc(collection(db, 'conversations', convRef.id, 'messages'), {
                        senderId: currentUser.uid,
                        text: initialMessage,
                        timestamp: serverTimestamp(),
                        read: false
                    });
                }
                
                closeNewChatModal();
                document.getElementById('newChatUser').value = '';
                document.getElementById('newChatMessage').value = '';
                showToast('Conversation created!', 'success');
                
            } catch (error) {
                console.error('Error creating conversation:', error);
                showToast('Failed to create conversation', 'error');
            }
        };

        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        function getTimeAgo(date) {
            const now = new Date();
            const diff = now - new Date(date);
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return 'Just now';
            if (minutes < 60) return `${minutes}m`;
            if (hours < 24) return `${hours}h`;
            if (days < 7) return `${days}d`;
            return new Date(date).toLocaleDateString();
        }

        function getMessageDateString(date) {
            const now = new Date();
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (date.toDateString() === now.toDateString()) return 'Today';
            if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
            return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        }

        function formatMessageTime(date) {
            return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // OTHER ACTIONS
        // ============================================
        window.startVoiceCall = () => showToast('Voice call coming soon!', 'success');
        window.startVideoCall = () => showToast('Video call coming soon!', 'success');
        window.showChatInfo = () => {
            if (currentConversation) {
                showToast(`Chatting with ${currentConversation.userName}`, 'success');
            }
        };
        window.attachImage = () => showToast('Image upload coming soon!', 'success');
        window.attachFile = () => showToast('File upload coming soon!', 'success');

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            toast.className = `toast ${type}`;
            toastMessage.textContent = message;
            icon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        document.getElementById('conversationSearch')?.addEventListener('input', renderConversations);
        
        document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        document.getElementById('headerSearch')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performHeaderSearch();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAllDropdowns();
                closeNewChatModal();
            }
        });

        console.log('🚀 Seedwel Real-Time Chat - Ready!');
    </script>
</body>
