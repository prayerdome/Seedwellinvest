<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Seedwel Global Marketplace</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f4f9fe 0%, #e8f2fa 100%);
            color: #1a2e4a;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        /* —— AUTH CARD —— */
        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 3rem 2.5rem;
            box-shadow: 0 30px 60px rgba(30, 70, 110, 0.12);
            border: 1px solid #d9e6f2;
        }

        /* —— BRAND —— */
        .brand-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 2.5rem;
        }

        .brand-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #1a4a7a 0%, #2a6a9e 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 8px 20px rgba(26, 74, 122, 0.2);
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 600;
            color: #0d2b4e;
            letter-spacing: -0.5px;
        }

        .brand-name span {
            font-family: 'Cormorant', serif;
            font-weight: 300;
            font-style: italic;
            font-size: 1.6rem;
            color: #2a6a9e;
            margin-left: 4px;
        }

        /* —— HEADER —— */
        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 500;
            color: #0d2b4e;
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: #7aadcc;
            font-size: 0.95rem;
        }

        /* —— FORM —— */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1a3a5c;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1.2rem;
            color: #a0c0e0;
            font-size: 1rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.2rem 1rem 3rem;
            border: 1.5px solid #d9e6f2;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #1a2e4a;
            background: white;
            transition: all 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: #3b7eb0;
            box-shadow: 0 0 0 4px rgba(59, 126, 176, 0.1);
        }

        .form-input::placeholder {
            color: #b0cee6;
        }

        .password-toggle {
            position: absolute;
            right: 1.2rem;
            color: #a0c0e0;
            cursor: pointer;
            transition: color 0.15s;
        }

        .password-toggle:hover {
            color: #5f8eb0;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -0.5rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #1a4a7a;
            cursor: pointer;
        }

        .remember-me span {
            font-size: 0.85rem;
            color: #5f8eb0;
        }

        .forgot-link {
            color: #3b7eb0;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.15s;
        }

        .forgot-link:hover {
            color: #1a4a7a;
        }

        /* —— BUTTONS —— */
        .btn-primary {
            background: linear-gradient(135deg, #1a4a7a 0%, #2a6a9e 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(26, 74, 122, 0.2);
            width: 100%;
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #0d2b4e 0%, #1a4a7a 100%);
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(26, 74, 122, 0.25);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-google {
            background: white;
            color: #3a5a7a;
            border: 1.5px solid #d9e6f2;
            padding: 0.9rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .btn-google:hover {
            background: #f8fcff;
            border-color: #b0cee6;
        }

        .btn-google i {
            color: #4285f4;
        }

        /* —— DIVIDER —— */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #b0cee6;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1.5px solid #e1ecf5;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        /* —— FOOTER —— */
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: #7aadcc;
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: #1a4a7a;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.15s;
        }

        .auth-footer a:hover {
            color: #0d2b4e;
            text-decoration: underline;
        }

        /* —— ERROR MESSAGE —— */
        .error-message {
            background: #fdeded;
            color: #e74c3c;
            padding: 0.9rem 1.2rem;
            border-radius: 14px;
            font-size: 0.85rem;
            display: none;
            align-items: center;
            gap: 10px;
            border: 1.5px solid #f5c6cb;
        }

        .error-message.show {
            display: flex;
        }

        .error-message i {
            font-size: 1rem;
        }

        /* —— SUCCESS MESSAGE —— */
        .success-message {
            background: #d5f5e3;
            color: #27ae60;
            padding: 0.9rem 1.2rem;
            border-radius: 14px;
            font-size: 0.85rem;
            display: none;
            align-items: center;
            gap: 10px;
            border: 1.5px solid #a9dfbf;
        }

        .success-message.show {
            display: flex;
        }

        /* —— LOADING SPINNER —— */
        .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* —— BACK LINK —— */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #7aadcc;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            transition: color 0.15s;
        }

        .back-link:hover {
            color: #1a4a7a;
        }

        /* —— TOAST —— */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a2e4a;
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 9999;
        }

        .toast.show { transform: translateX(0); }
        .toast.success { background: linear-gradient(135deg, #1a4a7a, #2a6a9e); }
        .toast.error { background: linear-gradient(135deg, #c0392b, #e74c3c); }

        /* —— RESPONSIVE —— */
        @media (max-width: 500px) {
            body { padding: 1rem; align-items: flex-start; }
            .auth-card { padding: 2rem 1.5rem; }
            .brand-name { font-size: 1.8rem; }
            .brand-name span { font-size: 1.3rem; }
            .auth-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        
        <div class="auth-card">
            <!-- BRAND -->
            <div class="brand-section">
                <div class="brand-icon">
                    <i class="fas fa-globe"></i>
                </div>
                <div class="brand-name">
                    Seedwel 
                    <span>marketplace</span>
                </div>
            </div>

            <!-- HEADER -->
            <div class="auth-header">
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-subtitle">Sign in to your account to continue</p>
            </div>

            <!-- ERROR MESSAGE -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid email or password</span>
            </div>

            <!-- SUCCESS MESSAGE -->
            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Login successful! Redirecting...</span>
            </div>

            <!-- LOGIN FORM -->
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-input" id="password" placeholder="••••••••" required>
                        <i class="fas fa-eye password-toggle" id="togglePassword" onclick="togglePasswordVisibility()"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link" onclick="forgotPassword()">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <!-- DIVIDER -->
            <div class="divider">or continue with</div>

            <!-- GOOGLE SIGN-IN -->
            <button class="btn-google" onclick="signInWithGoogle()">
                <i class="fab fa-google"></i> Sign in with Google
            </button>

            <!-- FOOTER -->
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Create account</a>
            </div>
        </div>
        
        <!-- DEMO CREDENTIALS -->
        <div style="text-align: center; margin-top: 1.5rem; color: #a0c0e0; font-size: 0.8rem;">
            <i class="fas fa-info-circle"></i> Demo: demo@seedwel.com / password123
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Message</span>
    </div>

    <script type="module">
        // Firebase Configuration
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            signInWithPopup, 
            GoogleAuthProvider,
            setPersistence,
            browserLocalPersistence,
            browserSessionPersistence,
            sendPasswordResetEmail,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-BpRy-RVc2rqIG6uiRu_XrGEu1ZGnQwU",
            authDomain: "seedwel-investment-limited.firebaseapp.com",
            databaseURL: "https://seedwel-investment-limited-default-rtdb.firebaseio.com",
            projectId: "seedwel-investment-limited",
            storageBucket: "seedwel-investment-limited.firebasestorage.app",
            messagingSenderId: "197778268619",
            appId: "1:197778268619:web:92f29d88fa5a22dbfa964e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in, redirect to dashboard
                const redirectUrl = localStorage.getItem('redirectAfterLogin') || 'dashboard.html';
                localStorage.removeItem('redirectAfterLogin');
                window.location.href = redirectUrl;
            }
        });

        // Toggle password visibility
        window.togglePasswordVisibility = function() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePassword');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        };

        // Hide error message
        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        // Show error message
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorEl.classList.add('show');
            
            // Hide success message
            document.getElementById('successMessage').classList.remove('show');
        }

        // Show success message
        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            const successText = document.getElementById('successText');
            successText.textContent = message;
            successEl.classList.add('show');
            
            // Hide error message
            document.getElementById('errorMessage').classList.remove('show');
        }

        // Get friendly error message
        function getErrorMessage(errorCode) {
            const messages = {
                'auth/invalid-email': 'Please enter a valid email address.',
                'auth/user-disabled': 'This account has been disabled.',
                'auth/user-not-found': 'No account found with this email.',
                'auth/wrong-password': 'Incorrect password. Please try again.',
                'auth/too-many-requests': 'Too many failed attempts. Please try again later.',
                'auth/network-request-failed': 'Network error. Please check your connection.',
                'auth/popup-closed-by-user': 'Sign-in popup was closed.',
                'auth/popup-blocked': 'Pop-up was blocked. Please allow pop-ups.',
                'auth/invalid-credential': 'Invalid email or password.'
            };
            return messages[errorCode] || 'An error occurred. Please try again.';
        }

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            
            // Basic validation
            if (!email || !password) {
                showError('Please enter both email and password.');
                return;
            }
            
            // Disable button and show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            
            try {
                // Set persistence based on "Remember me"
                const persistence = rememberMe ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistence);
                
                // Sign in
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                
                showSuccess('Login successful! Redirecting...');
                showToast('Welcome back!', 'success');
                
                // Store user data
                localStorage.setItem('seedwel_user', JSON.stringify({
                    uid: userCredential.user.uid,
                    email: userCredential.user.email,
                    displayName: userCredential.user.displayName
                }));
                
                // Redirect after short delay
                setTimeout(() => {
                    const redirectUrl = localStorage.getItem('redirectAfterLogin') || 'dashboard.html';
                    localStorage.removeItem('redirectAfterLogin');
                    window.location.href = redirectUrl;
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                showError(getErrorMessage(error.code));
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        });

        // Google Sign-In
        window.signInWithGoogle = async function() {
            hideError();
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            
            try {
                const result = await signInWithPopup(auth, googleProvider);
                
                showSuccess('Google sign-in successful! Redirecting...');
                showToast('Welcome!', 'success');
                
                // Store user data
                localStorage.setItem('seedwel_user', JSON.stringify({
                    uid: result.user.uid,
                    email: result.user.email,
                    displayName: result.user.displayName,
                    photoURL: result.user.photoURL
                }));
                
                setTimeout(() => {
                    const redirectUrl = localStorage.getItem('redirectAfterLogin') || 'dashboard.html';
                    localStorage.removeItem('redirectAfterLogin');
                    window.location.href = redirectUrl;
                }, 1000);
                
            } catch (error) {
                console.error('Google sign-in error:', error);
                
                if (error.code !== 'auth/popup-closed-by-user') {
                    showError(getErrorMessage(error.code));
                }
                
                loginBtn.disabled = false;
            }
        };

        // Forgot password
        window.forgotPassword = async function() {
            const email = document.getElementById('email').value.trim();
            
            if (!email) {
                showError('Please enter your email address first.');
                return;
            }
            
            try {
                await sendPasswordResetEmail(auth, email);
                showToast('Password reset email sent! Check your inbox.', 'success');
                showSuccess('Reset email sent! Check your inbox.');
            } catch (error) {
                console.error('Password reset error:', error);
                showError(getErrorMessage(error.code));
            }
        };

        // Toast function
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            
            toast.className = `toast ${type}`;
            toastMessage.textContent = message;
            icon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Check for redirect URL in params
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect');
        if (redirect) {
            localStorage.setItem('redirectAfterLogin', redirect);
        }

        // Clear error on input
        document.getElementById('email').addEventListener('input', hideError);
        document.getElementById('password').addEventListener('input', hideError);
        
        // Demo quick fill (double click on brand)
        let clickCount = 0;
        document.querySelector('.brand-section').addEventListener('click', function() {
            clickCount++;
            if (clickCount >= 3) {
                document.getElementById('email').value = 'demo@seedwel.com';
                document.getElementById('password').value = 'password123';
                showToast('Demo credentials filled!', 'success');
                clickCount = 0;
            }
            setTimeout(() => { clickCount = 0; }, 1000);
        });

        console.log('🚀 Seedwel Login Page - Ready!');
    </script>
</body>
</html>
